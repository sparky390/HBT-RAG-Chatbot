version: '3.8'

services:
  # Ollama LLM service
  ollama:
    image: ollama/ollama:latest
    container_name: hbt-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hbt-network

  # Streamlit chatbot app
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hbt-chatbot
    ports:
      - "8501:8501"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    networks:
      - hbt-network
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501

volumes:
  ollama_data:
    driver: local

networks:
  hbt-network:
    driver: bridge
